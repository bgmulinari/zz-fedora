name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container: fedora:44
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare CI environment
        run: bash scripts/ci-setup.sh
      - name: Full regression and lint
        run: runuser -u zzci -- env HOME=/home/zzci USER=zzci ZZ_TEST_LINT=1 ./tests/full.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets the release workflow reuse this test matrix as its gate.
  workflow_call:

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      fedora: ${{ steps.resolve.outputs.fedora }}
    steps:
      # The resolver needs only these two files; a default checkout would
      # pull the ~190 MB asset tree into this serial gate on every run.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: |
            /scripts/ci-fedora-matrix.sh
            /config/defaults.sh
          sparse-checkout-cone-mode: false
      # The script reads MINIMUM_FEDORA_RELEASE from config/defaults.sh and
      # drops the fedora:latest leg while it is the same image as the minimum
      # supported release, so the identical suite is not run twice.
      # shell: bash enables pipefail, so a resolver failure fails this step
      # instead of being masked by tee's exit status.
      - name: Resolve the Fedora container matrix
        id: resolve
        shell: bash
        run: bash scripts/ci-fedora-matrix.sh | tee -a "$GITHUB_OUTPUT"

  test:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: ${{ fromJSON(needs.matrix.outputs.fedora) }}
    container: fedora:${{ matrix.fedora }}
    timeout-minutes: 30
    steps:
      # Without git in the container, checkout falls back to a REST tarball
      # with no .git, leaving the ISO build-info stamp without a HEAD revision.
      - name: Install git for checkout
        run: dnf install -y git
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare CI environment
        run: bash scripts/ci-setup.sh
      - name: Full regression and lint
        run: runuser -u zzci -- env HOME=/home/zzci USER=zzci ZZ_TEST_LINT=1 ./tests/full.sh

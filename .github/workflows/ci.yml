name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets the release workflow reuse this test matrix as its gate.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # "44" must stay aligned with MINIMUM_FEDORA_RELEASE in
        # config/defaults.sh; tests/ci_setup.bats checks the pairing.
        fedora: ["44", "latest"]
    container: fedora:${{ matrix.fedora }}
    timeout-minutes: 30
    steps:
      # Without git in the container, checkout falls back to a REST tarball
      # with no .git, leaving the ISO build-info stamp without a HEAD revision.
      - name: Install git for checkout
        run: dnf install -y git
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare CI environment
        run: bash scripts/ci-setup.sh
      - name: Full regression and lint
        run: runuser -u zzci -- env HOME=/home/zzci USER=zzci ZZ_TEST_LINT=1 ./tests/full.sh

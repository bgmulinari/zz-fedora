name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container: fedora:44
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install test dependencies
        run: dnf install -y bats ShellCheck git python3 findutils rsync cpio gzip
      - name: Smoke and lint
        run: ZZ_TEST_LINT=1 ./tests/smoke.sh
      - name: Full regression
        run: ./tests/full.sh

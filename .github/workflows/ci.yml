name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container: fedora:44
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install test dependencies
        run: |
          dnf install -y bats ShellCheck git python3 findutils diffutils rsync cpio gzip shadow-utils sudo util-linux
          useradd --create-home zzci
          chown -R zzci:zzci "$GITHUB_WORKSPACE"
          runuser -u zzci -- env HOME=/home/zzci git config --global --add safe.directory "$GITHUB_WORKSPACE"
          runuser -u zzci -- env HOME=/home/zzci git -C "$GITHUB_WORKSPACE" rev-parse --is-inside-work-tree
      - name: Smoke and lint
        run: runuser -u zzci -- env HOME=/home/zzci USER=zzci ZZ_TEST_LINT=1 ./tests/smoke.sh
      - name: Full regression
        run: runuser -u zzci -- env HOME=/home/zzci USER=zzci ./tests/full.sh

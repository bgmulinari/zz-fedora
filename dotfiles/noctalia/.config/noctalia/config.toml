# Managed by zz-fedora.
#
# Noctalia v5 loads hand-written config from ~/.config/noctalia/*.toml.
# Noctalia writes GUI/runtime overrides to ~/.local/state/noctalia/settings.toml,
# so do not stow generated lockscreen or widget placement state here.

# Shell and session

[shell]
polkit_agent = true
telemetry_enabled = false

[shell.greeter_sync]
auto_sync = false

[shell.panel]
open_near_click_session = true

[[shell.session.actions]]
action = "lock"
countdown_seconds = 0.0
enabled = true
shortcut = "1"
variant = "default"

[[shell.session.actions]]
action = "logout"
countdown_seconds = 5.0
enabled = true
shortcut = "2"
variant = "default"

[[shell.session.actions]]
action = "lock_and_suspend"
countdown_seconds = 5.0
enabled = true
shortcut = "3"
variant = "default"

[[shell.session.actions]]
action = "reboot"
countdown_seconds = 5.0
enabled = true
shortcut = "4"
variant = "default"

[[shell.session.actions]]
action = "shutdown"
countdown_seconds = 5.0
enabled = true
shortcut = "5"
variant = "destructive"

# Bar, dock, and widgets

[bar.default]
start = [ "launcher", "wallpaper", "workspaces", "default-spacer", "taskbar" ]
center = [ "default-spacer", "clock", "default-spacer", "weather", "default-spacer" ]
end = [
  "media",
  "tray",
  "notifications",
  "clipboard",
  "network",
  "bluetooth",
  "volume",
  "brightness",
  "battery",
  "default-spacer",
  "niri-outputs",
  "settings",
  "control-center",
  "session",
]
margin_edge = 0
margin_ends = 0
radius = 0
radius_bottom_left = 10
radius_bottom_right = 10
concave_edge_corners = true
background_opacity = 0.9

[dock]
background_opacity = 0.9

[widget.clock]
format = "{:%b %d %H:%M}"

[widget.default-spacer]
type = "spacer"

[widget.niri-outputs]
type = "local/niri-outputs:launcher"

[widget.media]
hide_when_no_media = true

[widget.network]
show_label = false

[widget.taskbar]
only_active_workspace = true
show_window_title = true

[widget.weather]
show_condition = false

# Local plugins

[plugins]
enabled = [ "local/niri-outputs" ]

# Notifications and on-screen display

[notification]
background_opacity = 0.9

[osd]
background_opacity = 0.9

# Location and wallpaper

[location]
auto_locate = true

[wallpaper]
directory = "~/.local/share/backgrounds"

[wallpaper.default]
path = "~/.local/share/backgrounds/Alpenglow.jpg"

# Idle behavior

[idle]
behavior_order = [ "screen-off", "lock", "lock-and-suspend" ]
pre_action_fade_seconds = 10

[idle.behavior.lock]
action = "lock"
enabled = true
timeout = 360.0

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
enabled = false
timeout = 900.0

[idle.behavior.screen-off]
action = "screen_off"
enabled = true
timeout = 300.0

# Theme and templates

[theme]
mode = "dark"
source = "custom"
builtin = "Catppuccin"
custom_palette = "catppuccin-mocha-blue"

[theme.templates]
enable_builtin_templates = true
builtin_ids = [
  "niri",
  "ghostty",
  "starship",
  "btop",
  "gtk3",
  "gtk4",
  "kcolorscheme",
]
enable_community_templates = true
community_ids = [
  "pywalfox",
  "zen-browser",
  "neovim",
  "vscode",
  "zed",
  "yazi",
]

[theme.templates.user.icon_theme]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/icon-theme-accent"
output_path = "$XDG_CACHE_HOME/noctalia/icon-theme-accent"
post_hook = "$HOME/.local/bin/noctalia-sync-icon-theme"

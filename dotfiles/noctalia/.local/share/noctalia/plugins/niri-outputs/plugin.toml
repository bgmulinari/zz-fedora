id = "local/niri-outputs"
name = "Niri Outputs"
version = "0.1.1"
plugin_api = 3
author = "local"
license = "MIT"
icon = "device-desktop-cog"
description = "Configure connected Niri outputs from a native Noctalia panel"
tags = ["display", "niri", "settings"]
dependencies = ["niri", "python3"]

[[setting]]
key = "confirm_timeout"
type = "int"
label_key = "settings.confirm_timeout.label"
description_key = "settings.confirm_timeout.description"
default = 15
min = 5
max = 60

[[widget]]
id = "launcher"
entry = "widget.luau"

[[shortcut]]
id = "control-center"
entry = "shortcut.luau"

[[panel]]
id = "manager"
entry = "panel.luau"
width = 900
height = 720
placement = "attached"
position = "center"
open_near_click = true
